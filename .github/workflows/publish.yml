# Publish to npm when src/ changes are pushed to main
name: Publish to npm

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "package.json"

  # Allows manual trigger from the Actions tab
  workflow_dispatch:

# Prevent concurrent publish runs
concurrency:
  group: "npm-publish"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Job 1 – Build & validate
  # ──────────────────────────────────────────────
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify dist output exists
        run: test -d dist && echo "✓ dist/ exists" || (echo "✗ dist/ missing" && exit 1)

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2 – Run tests
  # ──────────────────────────────────────────────
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ──────────────────────────────────────────────
  # Job 3 – Publish to npm (OIDC trusted publishing)
  # ──────────────────────────────────────────────
  publish:
    name: Publish to npm
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: npm-publish

    permissions:
      contents: write
      id-token: write # Required for OIDC trusted publishing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: |
          npm version patch -m "chore: release v%s [skip ci]"

      - name: Publish to npm (OIDC)
        run: npm publish --access public

      - name: Push version bump
        run: git push --follow-tags

  # ──────────────────────────────────────────────
  # Job 4 – Create GitHub Release
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Get current date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          name: v${{ steps.pkg.outputs.version }} (${{ steps.date.outputs.today }})
          generate_release_notes: true
          body: |
            ## Install / Update

            ```bash
            npm install --save-dev liverun@${{ steps.pkg.outputs.version }}
            ```